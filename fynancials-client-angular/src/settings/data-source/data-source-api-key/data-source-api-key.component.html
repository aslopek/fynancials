@let dataSource = selectedDataSource();
@if (dataSource !== null) {
    <mat-card class="data-source-api-key">
        <mat-card-header>
            <mat-card-title>{{ dataSource.name }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <mat-form-field>
                <mat-label>API Key</mat-label>
                <input matInput
                       [value]="apiKey()"
                       (input)="onApiKeyInput($event)">
            </mat-form-field>

            <div class="button-group">
                <button mat-flat-button
                        color="primary"
                        [disabled]="!canSave()"
                        (click)="save()">
                    Save
                </button>
                <button mat-stroked-button
                        (click)="cancel()">
                    Cancel
                </button>
            </div>
        </mat-card-content>
    </mat-card>
}
