<div class="security-table">
    <app-security-table (securitySelected)="selectSecurityId($event)">
    </app-security-table>
</div>

@let securityId = selectedSecurityId();

@if (securityId != null) {
    <div class="security-chart">
        <app-historical-price [securityId]="securityId">
        </app-historical-price>
    </div>
}
