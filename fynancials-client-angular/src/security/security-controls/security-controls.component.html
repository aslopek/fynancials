<app-search-field (clear)="search(undefined)"
                  (search)="search($event)"
                  [searchString]="searchParams().search ?? ''"
                  class="search-field">
</app-search-field>

<button (click)="openAddDialog()"
        class="add-button"
        color="primary"
        mat-flat-button>
    <mat-icon fontIcon="add"></mat-icon>
    Add
</button>
