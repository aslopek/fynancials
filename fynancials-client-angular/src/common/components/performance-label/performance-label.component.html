<div class="performance-label">
    <h4 [class]="relativePerformanceStyle">
        @if (relativePerformance === 'infinity') {
            +&infin;
        } @else {
            {{ performanceIsPositive ? '+' : '' }}{{ relativePerformance / 100 | fyPercent }}
        }
    </h4>
    @if (!this.hideAbsoluteValues) {
        <h4 [class]="absolutePerformanceStyle">
            {{ performanceIsPositive ? '+' : '' }}{{ absolutePerformance | fyCurrency:currency }}
        </h4>
    }
</div>
