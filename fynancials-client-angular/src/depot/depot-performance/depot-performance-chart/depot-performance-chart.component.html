<div>
    @if (depotValues().length > 0) {
        <div (chartInit)="onChartInit($event)"
             [options]="depotValues() | depotPerformanceChart : hideAbsoluteValues() : currency() : showInvestedCapital() : filteredDepotValues() : benchmark()"
             echarts>
        </div>

        <div class="chart-footer">
            <div class="chart-footer__inner">
                <div>
                    <mat-checkbox class="chart-footer__checkbox"
                                  [checked]="addCashToAbsoluteValue()"
                                  (change)="setAddCashToAbsoluteValue($event.checked)">
                        Add Cash to Absolute Value
                    </mat-checkbox>
                </div>

                <div>
                    <mat-checkbox class="chart-footer__checkbox"
                                  [checked]="showInvestedCapital()"
                                  (change)="setShowInvestedCapital($event.checked)">
                        Show Invested Capital
                    </mat-checkbox>
                </div>
            </div>
        </div>
    }
</div>
