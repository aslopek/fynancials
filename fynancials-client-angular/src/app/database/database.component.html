<div class="flex-column">
    <app-title-toolbar (onClose)="close()"
                       title="Database"
                       class="title-bar">
    </app-title-toolbar>
    <mat-drawer-container class="drawer">
        <mat-drawer mode="side"
                    opened>
            @if (showConnectionData()) {
                <div class="side-panel side-panel-toggle-button">
                    <button mat-icon-button
                            matTooltip="Hide Connection Data"
                            (click)="toggleHideConnectionData()">
                        <mat-icon>chevron_left</mat-icon>
                    </button>
                </div>
                <div class="side-panel mat-typography">
                    <h3 class="side-panel-text">JDBC URL</h3>
                    <p class="side-panel-text">
                        {{ databaseConfig().connectionString }}
                        <mat-icon class="copy-button"
                                  fontIcon="content_copy"
                                  matTooltip="Copy"
                                  (click)="toggleHideConnectionData()"
                                  [cdkCopyToClipboard]="databaseConfig().connectionString">
                        </mat-icon>
                    </p>
                </div>
                <div class="side-panel">
                    <h3 class="side-panel-text">Username</h3>
                    <p class="side-panel-text">
                        {{ databaseConfig().username }}
                        <mat-icon class="copy-button"
                                  fontIcon="content_copy"
                                  matTooltip="Copy"
                                  (click)="toggleHideConnectionData()"
                                  [cdkCopyToClipboard]="databaseConfig().username">
                        </mat-icon>
                    </p>
                </div>
                <div class="side-panel">
                    <h3 class="side-panel-text">Password</h3>
                    <p class="side-panel-text">
                        {{ databaseConfig().password }}
                        <mat-icon class="copy-button"
                                  fontIcon="content_copy"
                                  matTooltip="Copy"
                                  (click)="toggleHideConnectionData()"
                                  [cdkCopyToClipboard]="databaseConfig().password">
                        </mat-icon>
                    </p>
                </div>
                @if (databaseConfig().fileLocation != null) {
                    <div class="side-panel">
                        <h3 class="side-panel-text">File Location</h3>
                        <p class="side-panel-text">
                            {{ databaseConfig().fileLocation }}
                            <mat-icon class="copy-button"
                                      fontIcon="content_copy"
                                      matTooltip="Copy"
                                      (click)="toggleHideConnectionData()"
                                      [cdkCopyToClipboard]="databaseConfig().fileLocation ?? ''">
                            </mat-icon>
                        </p>
                    </div>
                }
            } @else {
                <div>
                    <button mat-icon-button
                            matTooltip="Show Connection Data"
                            (click)="toggleHideConnectionData()">
                        <mat-icon>chevron_right</mat-icon>
                    </button>
                </div>
            }
        </mat-drawer>
        <iframe class="database-content"
                [src]="databaseWebInterfaceUrl()">
        </iframe>
    </mat-drawer-container>
</div>
