databaseChangeLog:
  - changeSet:
      id: 8
      author: Armin Slopek
      changes:
        - createTable:
            tableName: STOCK_SPLIT
            columns:
              - column:
                  name: ID
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: CREATED_AT
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: UPDATED_AT
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: SECURITY_ID
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: FK_STOCK_SPLIT__SECURITY
                    referencedTableName: SECURITY
              - column:
                  name: EX_DATE
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: QUANTITY_OLD
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: QUANTITY_NEW
                  type: BIGINT
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: STOCK_SPLIT
            columnNames: SECURITY_ID, EX_DATE
            constraintName: UNIQUE_SECUITY_ID__EX_DATE
            validate: true
