databaseChangeLog:
  - changeSet:
      id: 2
      author: Armin Slopek
      changes:
        - createTable:
            tableName: EXCHANGE_RATE
            columns:
              - column:
                  name: ID
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: CREATED_AT
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: UPDATED_AT
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: VERSION
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: DATE
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: BASE_CURRENCY
                  type: VARCHAR(3)
                  constraints:
                    nullable: false
              - column:
                  name: TARGET_CURRENCY
                  type: VARCHAR(3)
                  constraints:
                    nullable: false
              - column:
                  name: EXCHANGE_RATE
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: EXCHANGE_RATE
            constraintName: UNIQUE_EXCHANGE_RATE
            columnNames: DATE, BASE_CURRENCY, TARGET_CURRENCY
            validate: true
