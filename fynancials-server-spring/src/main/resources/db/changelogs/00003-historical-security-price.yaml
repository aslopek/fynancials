databaseChangeLog:
  - changeSet:
      id: 3
      author: Armin Slopek
      changes:
        - createTable:
            tableName: HISTORICAL_SECURITY_PRICE
            columns:
              - column:
                  name: ID
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: CREATED_AT
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: UPDATED_AT
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: VERSION
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: SECURITY_ID
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: FK_HISTORICAL_SECURITY_PRICE_SECURITY
                    referencedTableName: SECURITY
                    referencedColumnNames:
                      - ID
              - column:
                  name: PRICE
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: CURRENCY
                  type: VARCHAR(3)
                  constraints:
                    nullable: false
              - column:
                  name: DATE
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: DATA_PROVIDER
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: STOCK_EXCHANGE_ID
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: HISTORICAL_SECURITY_PRICE
            constraintName: UNIQUE_HISTORICAL_SECURITY_PRICE
            columnNames: SECURITY_ID, DATE

        - createTable:
            tableName: HISTORICAL_SECURITY_PRICE_CONFIG
            columns:
              - column:
                  name: ID
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: CREATED_AT
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: UPDATED_AT
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: VERSION
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: SECURITY_ID
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: FK_HISTORICAL_SECURITY_PRICE_CONFIG_SECURITY
                    referencedTableName: SECURITY
                    referencedColumnNames:
                      - ID
              - column:
                  name: DATA_PROVIDER
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: EXTERNAL_SECURITY_ID
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: PROVIDER_SPECIFIC_CONFIG_PARAMS
                  type: VARCHAR(255)
              - column:
                  name: IS_ACTIVE
                  type: BOOLEAN
                  constraints:
                    nullable: false
