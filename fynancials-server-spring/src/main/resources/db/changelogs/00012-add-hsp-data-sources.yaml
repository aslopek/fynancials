databaseChangeLog:
  - changeSet:
      id: 12
      author: Armin Slopek
      description: Add some historical security price data sources
      changes:
        - insert:
            tableName: HISTORICAL_SECURITY_PRICE_DATA_SOURCE
            columns:
              - column:
                  name: ID
                  valueNumeric: 1
              - column:
                  name: CREATED_AT
                  valueComputed: CURRENT_TIMESTAMP
              - column:
                  name: UPDATED_AT
                  valueComputed: CURRENT_TIMESTAMP
              - column:
                  name: VERSION
                  valueNumeric: 0
              - column:
                  name: NAME
                  value: Twelve Data
              - column:
                  name: JSON_PATH_DATE
                  value: $.values[*].datetime
              - column:
                  name: DATE_FORMAT
                  value: yyyy-MM-dd
              - column:
                  name: JSON_PATH_VALUE
                  value: $.values[*].close
              - column:
                  name: JSON_PATH_CURRENCY
                  value: $.meta.currency

        - insert:
            tableName: HISTORICAL_SECURITY_PRICE_DATA_SOURCE_URL
            columns:
              - column:
                  name: DATA_SOURCE_ID
                  valueComputed: "(SELECT ID FROM HISTORICAL_SECURITY_PRICE_DATA_SOURCE WHERE NAME = 'Twelve Data')"
              - column:
                  name: TIMESPAN_IN_DAYS
                  valueNumeric: 30
              - column:
                  name: URL_PATTERN
                  value: "https://api.twelvedata.com/time_series?symbol=#id()&interval=1day&apikey=#mask()&outputsize=30"

        - insert:
            tableName: HISTORICAL_SECURITY_PRICE_DATA_SOURCE_URL
            columns:
              - column:
                  name: DATA_SOURCE_ID
                  valueComputed: "(SELECT ID FROM HISTORICAL_SECURITY_PRICE_DATA_SOURCE WHERE NAME = 'Twelve Data')"
              - column:
                  name: TIMESPAN_IN_DAYS
                  valueNumeric: 90
              - column:
                  name: URL_PATTERN
                  value: "https://api.twelvedata.com/time_series?symbol=#id()&interval=1day&apikey=#mask()&outputsize=90"

        - insert:
            tableName: HISTORICAL_SECURITY_PRICE_DATA_SOURCE_URL
            columns:
              - column:
                  name: DATA_SOURCE_ID
                  valueComputed: "(SELECT ID FROM HISTORICAL_SECURITY_PRICE_DATA_SOURCE WHERE NAME = 'Twelve Data')"
              - column:
                  name: TIMESPAN_IN_DAYS
                  valueNumeric: 365
              - column:
                  name: URL_PATTERN
                  value: "https://api.twelvedata.com/time_series?symbol=#id()&interval=1day&apikey=#mask()&outputsize=365"

