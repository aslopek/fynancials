version: 2
  
multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: weekly

updates:
  - package-ecosystem: npm
    directory: /fynancials-client-angular
    patterns: ["*"]
    multi-ecosystem-group: all-dependencies
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: npm
    directory: /fynancials-api
    patterns: ["*"]
    multi-ecosystem-group: all-dependencies
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: maven
    directory: /fynancials-server-spring
    patterns: ["*"]
    multi-ecosystem-group: all-dependencies
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
