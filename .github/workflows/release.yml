name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (none releases the current version as-is)'
        type: choice
        options: [ patch, minor, none ]
        default: patch

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - id: bump
        run: node scripts/prepare-release.js "${{ inputs.bump }}"
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md \
            fynancials-client-angular/package.json fynancials-client-angular/package-lock.json \
            fynancials-server-spring/pom.xml
          git commit -m "Release v${{ steps.bump.outputs.version }}" --allow-empty
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main "v${{ steps.bump.outputs.version }}"
      - uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, macos-latest, ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ needs.prepare.outputs.version }}
      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '25'
          cache: maven
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: fynancials-client-angular/package-lock.json
      - run: mvn -B package
        working-directory: fynancials-server-spring
      - run: npm ci
        working-directory: fynancials-client-angular
      - run: npm run build
        working-directory: fynancials-client-angular
      - run: npm test
        working-directory: fynancials-client-angular
      - run: npm run licenses:check
        working-directory: fynancials-client-angular
      - run: npm run electron:pack
        working-directory: fynancials-client-angular
      - name: Collect artifacts
        shell: bash
        working-directory: fynancials-client-angular
        run: |
          version="${{ needs.prepare.outputs.version }}"
          mkdir -p release-artifacts
          case "${{ runner.os }}" in
            Windows)
              7z a "release-artifacts/fynancials-${version}-windows-x64.zip" ./out/fynancials-win32-x64 ;;
            macOS)
              ditto -c -k --sequesterRsrc --keepParent out/fynancials-darwin-arm64/fynancials.app \
                "release-artifacts/fynancials-${version}-macos-arm64.zip" ;;
            Linux)
              tar -czf "release-artifacts/fynancials-${version}-linux-x64.tar.gz" -C out fynancials-linux-x64 ;;
          esac
      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ runner.os }}
          path: fynancials-client-angular/release-artifacts/*
          if-no-files-found: error

  publish:
    needs: [ prepare, build ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - run: |
          gh release create "v${{ needs.prepare.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "Fynancials ${{ needs.prepare.outputs.version }}" \
            --notes-file artifacts/release-notes/release-notes.md \
            artifacts/dist-*/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
